# Carga variables de entorno locales desde .env (gitignored), si existe.
# Permite definir SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, etc. sin exportarlas manualmente.
spring.config.import=optional:file:.env[.properties]

# Default database configuration (local development uses H2 in-memory)
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:h2:mem:testdb}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# Enable H2 Console in local development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Actuator Configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Datadog Metrics Export
# Requiere las variables de entorno DD_API_KEY y DD_SITE (ver .env)
management.datadog.metrics.export.enabled=${DD_METRICS_ENABLED:false}
management.datadog.metrics.export.api-key=${DD_API_KEY:}
management.datadog.metrics.export.uri=https://api.${DD_SITE:datadoghq.com}
management.datadog.metrics.export.step=30s
management.metrics.tags.application=incentivos
management.metrics.tags.env=${DD_ENV:local}

# DevTools Configuration
spring.devtools.restart.enabled=true

# Server Configuration for Dockerfile / Render
server.port=${PORT:8080}

# Donaciones Module HTTP Client Configuration
# URL del módulo de Donaciones (para desarrollo local o Render)
donaciones.base-url=${DONACIONES_URL:http://localhost:8081}

# Logística Module HTTP Client Configuration
# URL del módulo de Logística (para desarrollo local o Render)
logistica.base-url=${LOGISTICA_URL:http://localhost:8082}

# Donadores y Entidades Module HTTP Client Configuration
# URL del módulo de Donadores y Entidades (para desarrollo local o Render)
donadoresyentidades.base-url=${DONADORES_Y_ENTIDADES_URL:http://localhost:8083}

# Production PostgreSQL example
# On Render or another host, configure these environment variables:
# SPRING_DATASOURCE_URL=jdbc:postgresql://<host>:<port>/<database>
# SPRING_DATASOURCE_USERNAME=<user>
# SPRING_DATASOURCE_PASSWORD=<password>
# SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
#
# If Render provides JDBC_DATABASE_URL, it will also be used automatically.
#
# For Donaciones module HTTP client, set:
# DONACIONES_URL=https://donatrack-donaciones.onrender.com (for Render deployment)
#
# For Logística module HTTP client, set:
# LOGISTICA_URL=https://logistica-i4rf.onrender.com (for Render deployment)
#
# For Donadores y Entidades module HTTP client, set:
# DONADORES_Y_ENTIDADES_URL=https://donadoresyentidadesv2.onrender.com (for Render deployment)
